<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NeonEdTech Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="NeonEdTech – Digital products for educators. Secure checkout, modern design." />

<style>
:root{--neon:#9cff00;--dark:#050700;--olive:#1f2b14;--muted:#9bb58a}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{background:var(--dark);color:#e6f0dc}
nav{position:fixed;top:0;width:100%;z-index:999;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);padding:14px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #4f6b2a}
nav h1{color:var(--neon);text-shadow:0 0 12px var(--neon)}
nav ul{display:flex;gap:22px;list-style:none}
nav li{cursor:pointer;color:#cde6a2;font-weight:500}
nav li:hover{color:var(--neon)}
.page{display:none;padding:120px 40px 70px;max-width:1400px;margin:auto}
.page.active{display:block}
.hero{height:100vh;background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.9)),url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h2{font-size:3.2rem;color:var(--neon);text-shadow:0 0 18px var(--neon)}
.hero p{margin:18px 0;font-size:1.25rem;color:#dfeccf}
.btn{display:inline-block;padding:14px 36px;border-radius:10px;background:linear-gradient(135deg,var(--neon),#5f7d34);color:#000;font-weight:700;cursor:pointer;box-shadow:0 0 30px rgba(156,255,0,.6);transition:.25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 45px rgba(156,255,0,.55)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px}
.card{background:linear-gradient(160deg,#0d1209,var(--olive));padding:18px;border-radius:16px;border:1px solid #4f6b2a;box-shadow:0 0 25px rgba(156,255,0,.12);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-6px);box-shadow:0 0 40px rgba(156,255,0,.55)}
.card video{width:100%;border-radius:12px;margin-bottom:12px}
.card h3{color:var(--neon);margin-bottom:6px}
.card span{color:var(--muted);font-size:.95rem}
.detail{max-width:900px;margin:auto}
.detail video{width:100%;border-radius:14px;margin-bottom:18px}
.detail h2{color:var(--neon)}
.detail p{margin:12px 0;color:#dce8cc}
.detail h3{margin-top:10px}
select{padding:10px;background:#000;border:1px solid #4f6b2a;color:#e6f0dc;border-radius:6px;margin-top:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:3000}
.modal.active{display:flex}
.box{background:#0d1209;padding:28px;border-radius:14px;border:1px solid #4f6b2a;width:360px}
.box h3{color:var(--neon);margin-bottom:12px}
.box button{margin-top:10px;width:100%;padding:12px;background:linear-gradient(135deg,var(--neon),#4f6b2a);border:none;color:#000;font-weight:700;border-radius:8px;cursor:pointer}
.box button:hover{opacity:.9}
#paymentInfo{margin-top:10px;font-size:.9rem;color:#cde6a2}
.contact-form{max-width:600px;margin:auto}
.contact-form input,.contact-form textarea{width:100%;padding:12px;margin-bottom:14px;background:#000;border:1px solid #4f6b2a;color:#e6f0dc;border-radius:6px}
footer{text-align:center;padding:30px;border-top:1px solid #4f6b2a;color:#7fa15a}
@media(max-width:700px){nav{padding:14px 20px}.hero h2{font-size:2.3rem}}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDVLlWsichoOlc7AYExJIzZZp0Q7IRPLpo",
  authDomain: "neonedtech-d333c.firebaseapp.com",
  projectId: "neonedtech-d333c",
  storageBucket: "neonedtech-d333c.appspot.com",
  messagingSenderId: "1048641950095",
  appId: "1:1048641950095:web:571785edb05cdcaede3bfa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];

// Load products
async function loadProducts() {
  const snapshot = await getDocs(collection(db, "products"));
  products = [];
  snapshot.forEach(docSnap => products.push({id: docSnap.id, ...docSnap.data()}));
  renderProducts();
}

// Render product grid
function renderProducts(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  products.forEach((p,i)=>{
    const c=document.createElement('div');
    c.className='card';
    if(p.video.includes('youtube.com')||p.video.includes('youtu.be')){
      c.innerHTML=`<iframe width="100%" height="180" src="${p.video.replace('watch?v=','embed/')}"></iframe>
                   <h3>${p.title}</h3><span>${p.price}</span>`;
    } else {
      c.innerHTML=`<video muted loop playsinline src="${p.video}"></video>
                   <h3>${p.title}</h3><span>${p.price}</span>`;
    }
    c.onmouseenter=()=>{ const v=c.querySelector('video'); if(v)v.play(); };
    c.onmouseleave=()=>{ const v=c.querySelector('video'); if(v)v.pause(); };
    c.onclick=()=>openDetail(i);
    grid.appendChild(c);
  });
}

// Product detail
let selectedProductIndex = null;
function openDetail(i){
  selectedProductIndex=i;
  const p=products[i];
  dVideo.style.display = p.video.includes('youtube.com') ? 'none' : 'block';
  const yt = document.getElementById('yt'); if(yt) yt.remove();
  if(p.video.includes('youtube.com')){
    dVideo.insertAdjacentHTML('afterend',`<iframe id="yt" width="100%" height="420" src="${p.video.replace('watch?v=','embed/')}"></iframe>`);
  } else dVideo.src = p.video;

  dTitle.innerText = p.title;
  dDesc.innerText = p.desc || '';
  dPrice.innerText = p.price;
  updatePaymentOptions();
  go('detail');
}

// Payment buttons
function updatePaymentOptions(){
  const region = document.getElementById('region').value;
  const container = document.getElementById('paymentButtons');
  container.innerHTML='';
  const p=products[selectedProductIndex];
  checkoutProduct.innerText = 'Product: '+p.title;
  checkoutPrice.innerText = 'Price: '+p.price;

  if(region==='ethiopia'){
    container.innerHTML=`<p>After payment via TeleBirr or Bank Transfer, please contact admin through the Contact page to receive your product.</p>
                         <button onclick="pay('TeleBirr')">📱 TeleBirr</button>
                         <button onclick="pay('Bank')">🏦 Bank Transfer</button>`;
  } else {
    container.innerHTML=`<button onclick="lemonCheckout('${p.id}')">🌎 Pay Internationally</button>`;
  }
}

// Ethiopian payment
window.pay = async function(method){
  const p = products[selectedProductIndex];
  const ref = 'ORD-'+Date.now();
  checkout.classList.add('active');
  paymentInfo.innerHTML = `Send payment using <b>${method}</b><br>Reference: <b>${ref}</b><br>Then contact admin via Contact page to get your product.`;
  
  await addDoc(collection(db,"orders"),{
    id: ref,
    product: p.title,
    method,
    status: 'Pending',
    timestamp: Date.now()
  });
}

// Lemon Squeezy checkout
function lemonCheckout(productId){
  const product = products.find(p=>p.id===productId);
  const lemonUrl = product.lemonsqueezyUrl || 'https://app.lemonsqueezy.com/checkout/buy/YOUR_PRODUCT_CHECKOUT_ID';
  window.open(lemonUrl,'_blank');
}

// Close checkout
function closeCheckout(){ checkout.classList.remove('active'); }

// Navigation
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Expose functions
window.go = go;
window.updatePaymentOptions = updatePaymentOptions;
window.closeCheckout = closeCheckout;

loadProducts();
</script>
</head>

<body>
<nav>
<h1>NeonEdTech</h1>
<ul>
<li onclick="go('home')">Home</li>
<li onclick="go('products')">Products</li>
<li onclick="go('contact')">Contact</li>
</ul>
</nav>

<section id="home" class="page active">
<div class="hero">
<div>
<h2>Digital Products for Educators</h2>
<p>Secure. Modern. Built for real-world teaching.</p>
<div class="btn" onclick="go('products')">Browse Products</div>
</div>
</div>
</section>

<section id="products" class="page">
<h2 style="text-align:center;color:var(--neon);margin-bottom:30px">Products</h2>
<div class="grid" id="grid"></div>
</section>

<section id="detail" class="page">
<div class="detail">
<h2 id="dTitle"></h2>
<video id="dVideo" controls></video>
<p id="dDesc"></p>
<h3 id="dPrice"></h3>

<label>Region</label><br />
<select id="region" onchange="updatePaymentOptions()">
<option value="ethiopia">Ethiopia</option>
<option value="international">International</option>
</select>

<div id="paymentButtons" style="margin-top:18px"></div>
</div>
</section>

<section id="contact" class="page">
<h2 style="color:var(--neon)">Contact</h2>
<div class="contact-form">
<form action="https://formspree.io/f/mdadqqwa" method="POST">
<input name="name" placeholder="Name" required />
<input name="email" placeholder="Email" required />
<textarea name="message" rows="5" placeholder="Message" required></textarea>
<button class="btn" type="submit">Send</button>
</form>
</div>
</section>

<div class="modal" id="checkout">
<div class="box">
<h3>Payment Instructions</h3>
<p id="checkoutProduct"></p>
<p id="checkoutPrice"></p>
<div id="paymentInfo"></div>
<button onclick="closeCheckout()">Close</button>
</div>
</div>

<footer>© 2026 NeonEdTech · Secure Digital Products</footer>
</body>
</html>
