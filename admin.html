<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeonEdTech Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

// 🔑 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDVLlWsichoOlc7AYExJIzZZp0Q7IRPLpo",
  authDomain: "neonedtech-d333c.firebaseapp.com",
  projectId: "neonedtech-d333c",
  storageBucket: "neonedtech-d333c.appspot.com",
  messagingSenderId: "1048641950095",
  appId: "1:1048641950095:web:571785edb05cdcaede3bfa",
  measurementId: "G-89MC8M6P5L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const analytics = getAnalytics(app);

// 🔐 Admin UID
const ADMIN_UID = "aMYFfDGXOfOC2hT3Re4dOyC5K3k2";

// LOGIN
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(err){
    alert("Login failed: "+err.message);
  }
}

// AUTH CHECK
onAuthStateChanged(auth, user=>{
  if(user){
    if(user.uid === ADMIN_UID){
      document.getElementById("loginBox").style.display="none";
      document.getElementById("adminPanel").style.display="block";
      loadProducts();
      loadOrders();
      loadSubscribers();
    } else {
      alert("Unauthorized account");
      signOut(auth);
    }
  } else {
    document.getElementById("loginBox").style.display="block";
    document.getElementById("adminPanel").style.display="none";
  }
});

// LOGOUT
window.logout = function(){ signOut(auth); }

// ADD PRODUCT
window.addProduct = async function(){
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const video = document.getElementById("video").value;
  const desc = document.getElementById("desc").value;
  if(!title || !price) return alert("Title and Price required");
  await addDoc(collection(db,"products"),{title, price, video, desc});
  loadProducts();
}

// LOAD PRODUCTS
async function loadProducts(){
  const snapshot = await getDocs(collection(db,"products"));
  const table = document.getElementById("productTable");
  table.innerHTML="<tr><th>Title</th><th>Price</th><th>Action</th></tr>";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    table.innerHTML += `
      <tr>
        <td>${data.title}</td>
        <td>${data.price}</td>
        <td><button onclick="deleteProduct('${docSnap.id}')">Delete</button></td>
      </tr>`;
  });
}

// DELETE PRODUCT
window.deleteProduct = async function(id){
  await deleteDoc(doc(db,"products",id));
  loadProducts();
}

// VERIFY ORDER
window.verifyOrder = async function(id){
  await updateDoc(doc(db,"orders",id),{status:"Verified"});
}

// 🔹 Real-time Orders
function loadOrders(){
  const table = document.getElementById("orderTable");
  table.innerHTML = "<tr><th>Order ID</th><th>Product</th><th>Method</th><th>Email</th><th>Status</th><th>Timestamp</th><th>Action</th></tr>";
  
  const ordersCol = collection(db,"orders");
  onSnapshot(ordersCol, snapshot => {
    // reset table
    table.innerHTML = "<tr><th>Order ID</th><th>Product</th><th>Method</th><th>Email</th><th>Status</th><th>Timestamp</th><th>Action</th></tr>";
    snapshot.forEach(docSnap=>{
      const data = docSnap.data();
      const ts = data.timestamp ? new Date(data.timestamp).toLocaleString() : '-';
      table.innerHTML += `
        <tr>
          <td>${data.id || docSnap.id}</td>
          <td>${data.product}</td>
          <td>${data.method}</td>
          <td>${data.email || '-'}</td>
          <td>${data.status}</td>
          <td>${ts}</td>
          <td><button onclick="verifyOrder('${docSnap.id}')">Verify</button></td>
        </tr>`;
    });
  });
}

// LOAD SUBSCRIBERS
async function loadSubscribers(){
  const snapshot = await getDocs(collection(db,"subscribers"));
  const table = document.getElementById("subscriberTable");
  if(!table) return;
  table.innerHTML="<tr><th>Email</th><th>Product</th><th>Timestamp</th></tr>";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const ts = data.timestamp ? new Date(data.timestamp).toLocaleString() : '-';
    table.innerHTML += `
      <tr>
        <td>${data.email || '-'}</td>
        <td>${data.product || '-'}</td>
        <td>${ts}</td>
      </tr>`;
  });
}

</script>

<style>
body{background:#050700;color:#e6f0dc;font-family:Segoe UI;padding:40px}
h1{color:#9cff00}
input,button{padding:10px;margin:5px 0;width:100%}
button{background:#9cff00;border:none;font-weight:bold;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{border:1px solid #4f6b2a;padding:8px}
</style>
</head>
<body>

<h1>NeonEdTech Admin</h1>

<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">
<button onclick="logout()">Logout</button>

<h2>Add Product</h2>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="video" placeholder="Video URL">
<input id="desc" placeholder="Description">
<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>
<table id="productTable"></table>

<h2>Orders</h2>
<table id="orderTable"></table>

<h2>Subscribers</h2>
<table id="subscriberTable"></table>

</div>

</body>
</html>
